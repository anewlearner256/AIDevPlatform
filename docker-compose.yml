version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:16-alpine
    container_name: aidev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aidevplatform
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aidev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: aidev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aidev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI应用服务（可选）
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: aidev-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/aidevplatform
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./knowledge_base:/app/knowledge_base
      - ./chroma-data:/app/chroma-data
    networks:
      - aidev-network

  # Celery工作进程（可选）
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: aidev-celery-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/aidevplatform
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./uploads:/app/uploads
      - ./knowledge_base:/app/knowledge_base
    networks:
      - aidev-network

  # Celery Beat调度器（可选）
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: aidev-celery-beat
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/aidevplatform
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    command: celery -A core.tasks.celery_app beat --loglevel=info
    volumes:
      - ./uploads:/app/uploads
      - ./knowledge_base:/app/knowledge_base
    networks:
      - aidev-network

  # Nginx反向代理（可选）
  nginx:
    image: nginx:1.25-alpine
    container_name: aidev-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./uploads:/usr/share/nginx/html/uploads
    networks:
      - aidev-network

networks:
  aidev-network:
    driver: bridge
    name: aidev-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local